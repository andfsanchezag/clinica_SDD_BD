<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clínica IPS — Médico</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<div id="navbar-container"></div>

<div class="container-fluid py-3">
  <h5 class="page-header"><i class="bi bi-stethoscope me-2"></i>Panel Médico</h5>

  <ul class="nav nav-tabs mb-3">
    <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#tab-encuentros"><i class="bi bi-clipboard2-pulse me-1"></i>Encuentros</a></li>
    <li class="nav-item"><a class="nav-link"        data-bs-toggle="tab" href="#tab-ordenes">  <i class="bi bi-file-medical me-1"></i>Órdenes</a></li>
  </ul>

  <div id="banner-encuentros" class="mb-2"></div>
  <div id="banner-ordenes"    class="mb-2"></div>

  <div class="tab-content">

    <!-- ══════════════════ ENCUENTROS ══════════════════ -->
    <div class="tab-pane fade show active" id="tab-encuentros">
      <div class="row g-3">

        <!-- Abrir encuentro -->
        <div class="col-lg-6">
          <div class="card h-100">
            <div class="card-header"><i class="bi bi-clipboard-plus me-1"></i>Abrir Encuentro</div>
            <div class="card-body">
              <form id="form-abrir-encuentro" novalidate>
                <div class="mb-2">
                  <label class="form-label">ID Cita *</label>
                  <input type="number" class="form-control form-control-sm" name="citaId" required>
                </div>
                <div class="mb-2">
                  <label class="form-label">ID Paciente *</label>
                  <input type="number" class="form-control form-control-sm" name="pacienteId" required>
                </div>
                <div class="mb-2">
                  <label class="form-label">Motivo consulta *</label>
                  <textarea class="form-control form-control-sm" name="motivoConsulta" rows="2" required></textarea>
                </div>
                <div class="mb-3">
                  <label class="form-label">Sintomatología</label>
                  <textarea class="form-control form-control-sm" name="sintomatologia" rows="2"></textarea>
                </div>
                <button id="btn-abrir-encuentro" type="submit" class="btn btn-primary btn-sm w-100">
                  <i class="bi bi-clipboard-check me-1"></i>Abrir encuentro
                </button>
              </form>
            </div>
          </div>
        </div>

        <!-- Cerrar encuentro -->
        <div class="col-lg-6">
          <div class="card h-100">
            <div class="card-header"><i class="bi bi-clipboard-x me-1"></i>Cerrar Encuentro</div>
            <div class="card-body">
              <form id="form-cerrar-encuentro" novalidate>
                <div class="mb-2">
                  <label class="form-label">ID Encuentro *</label>
                  <input type="number" class="form-control form-control-sm" name="encuentroId" required>
                </div>
                <div class="mb-2">
                  <label class="form-label">Diagnóstico *</label>
                  <textarea class="form-control form-control-sm" name="diagnostico" rows="2" required></textarea>
                </div>
                <div class="mb-2">
                  <label class="form-label">Tratamiento *</label>
                  <textarea class="form-control form-control-sm" name="tratamiento" rows="2" required></textarea>
                </div>
                <div class="mb-3">
                  <label class="form-label">Observaciones</label>
                  <textarea class="form-control form-control-sm" name="observaciones" rows="2"></textarea>
                </div>
                <button id="btn-cerrar-encuentro" type="submit" class="btn btn-danger btn-sm w-100">
                  <i class="bi bi-clipboard2-minus me-1"></i>Cerrar encuentro
                </button>
              </form>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- ══════════════════ ÓRDENES ══════════════════ -->
    <div class="tab-pane fade" id="tab-ordenes">
      <div class="row g-3">

        <!-- Registrar orden -->
        <div class="col-lg-6">
          <div class="card h-100">
            <div class="card-header"><i class="bi bi-file-earmark-plus me-1"></i>Registrar Orden</div>
            <div class="card-body">
              <form id="form-orden" novalidate>
                <div class="mb-2">
                  <label class="form-label">N° Orden *</label>
                  <input type="text" class="form-control form-control-sm" name="numeroOrden" required>
                </div>
                <div class="mb-2">
                  <label class="form-label">ID Encuentro *</label>
                  <input type="number" class="form-control form-control-sm" name="encuentroId" required>
                </div>
                <div class="mb-2">
                  <label class="form-label">ID Paciente *</label>
                  <input type="number" class="form-control form-control-sm" name="pacienteId" required>
                </div>
                <div class="mb-2">
                  <label class="form-label">Tipo de orden *</label>
                  <select class="form-select form-select-sm" id="sel-tipo-orden" name="tipoOrdenId" required>
                    <option value="">-- Seleccione --</option>
                  </select>
                </div>
                <div class="form-check mb-2">
                  <input class="form-check-input" type="checkbox" id="chk-requiere-esp">
                  <label class="form-check-label" for="chk-requiere-esp">Requiere especialidad</label>
                </div>
                <div id="div-especialidad" class="mb-2 d-none">
                  <label class="form-label">ID Especialidad</label>
                  <input type="number" class="form-control form-control-sm" name="especialidadId">
                </div>
                <button id="btn-registrar-orden" type="submit" class="btn btn-primary btn-sm w-100">
                  <i class="bi bi-save me-1"></i>Registrar orden
                </button>
              </form>
            </div>
          </div>
        </div>

        <!-- Agregar detalle -->
        <div class="col-lg-6">
          <div class="card h-100">
            <div class="card-header"><i class="bi bi-list-ul me-1"></i>Agregar Detalle de Orden</div>
            <div class="card-body">
              <form id="form-detalle" novalidate>
                <div class="row g-2">
                  <div class="col-md-6">
                    <label class="form-label">ID Orden *</label>
                    <input type="number" class="form-control form-control-sm" name="ordenId" required>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Tipo detalle *</label>
                    <select class="form-select form-select-sm" name="tipoDetalle" required>
                      <option value="">-- Seleccione --</option>
                      <option value="medicamento">Medicamento</option>
                      <option value="procedimiento">Procedimiento</option>
                      <option value="ayuda_diagnostica">Ayuda diagnóstica</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Item *</label>
                    <input type="number" class="form-control form-control-sm" name="item" min="1" required>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">ID Referencia *</label>
                    <input type="number" class="form-control form-control-sm" name="referenciaId" required>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Dosis</label>
                    <input type="text" class="form-control form-control-sm" name="dosis" placeholder="Ej: 500mg c/8h">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Duración</label>
                    <input type="text" class="form-control form-control-sm" name="duracion" placeholder="Ej: 7 días">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Cantidad</label>
                    <input type="number" class="form-control form-control-sm" name="cantidad" value="1">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Frecuencia</label>
                    <input type="text" class="form-control form-control-sm" name="frecuencia" placeholder="Ej: Cada 8h">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Costo</label>
                    <input type="number" step="0.01" class="form-control form-control-sm" name="costo">
                  </div>
                  <div class="col-md-6 d-flex align-items-end pb-1">
                    <div class="form-check">
                      <input class="form-check-input" type="checkbox" id="chk-requiere-esp-det" name="requiereEsp">
                      <label class="form-check-label" for="chk-requiere-esp-det">Requiere especialidad</label>
                    </div>
                  </div>
                  <div class="col-12" id="div-esp-det">
                    <label class="form-label">ID Especialidad</label>
                    <input type="number" class="form-control form-control-sm" name="especialidadId">
                  </div>
                </div>
                <button id="btn-agregar-detalle" type="submit" class="btn btn-secondary btn-sm w-100 mt-2">
                  <i class="bi bi-plus-circle me-1"></i>Agregar detalle
                </button>
              </form>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="../js/doctor/presentation/encuentro.controller.js"></script>
<script type="module" src="../js/doctor/presentation/orden.controller.js"></script>
</body>
</html>
