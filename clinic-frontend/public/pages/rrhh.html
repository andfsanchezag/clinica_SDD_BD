<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clínica IPS — Recursos Humanos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../assets/css/styles.css">
  <!-- bcryptjs para hash de contraseña (solo en esta página) -->
  <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
</head>
<body>

<div id="navbar-container"></div>

<div class="container-fluid py-3">
  <h5 class="page-header"><i class="bi bi-people-fill me-2"></i>Recursos Humanos</h5>

  <div class="alert alert-warning py-2 mb-3" role="alert">
    <i class="bi bi-shield-lock me-1"></i>
    La contraseña se cifra con bcrypt en el navegador antes de enviarse al servidor.
  </div>

  <ul class="nav nav-tabs mb-3">
    <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#tab-empleados"><i class="bi bi-person-vcard me-1"></i>Empleados</a></li>
    <li class="nav-item"><a class="nav-link"        data-bs-toggle="tab" href="#tab-usuarios"> <i class="bi bi-person-gear me-1"></i>Usuarios del sistema</a></li>
  </ul>

  <div id="banner-rrhh" class="mb-2"></div>

  <div class="tab-content">

    <!-- ══════════════════ EMPLEADOS ══════════════════ -->
    <div class="tab-pane fade show active" id="tab-empleados">
      <div class="card" style="max-width:700px;">
        <div class="card-header"><i class="bi bi-person-plus me-1"></i>Registrar Empleado</div>
        <div class="card-body">
          <form id="form-empleado" novalidate>
            <div class="row g-2">
              <div class="col-md-6">
                <label class="form-label">Cédula *</label>
                <input type="text" class="form-control form-control-sm" name="cedula" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Tipo documento *</label>
                <select class="form-select form-select-sm" id="sel-tipo-doc-emp" name="tipoDocId" required>
                  <option value="">-- Seleccione --</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">Nombre completo *</label>
                <input type="text" class="form-control form-control-sm" name="nombreCompleto" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Fecha nacimiento *</label>
                <input type="date" class="form-control form-control-sm" name="fechaNacimiento" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Rol *</label>
                <select class="form-select form-select-sm" id="sel-rol-emp" name="rolId" required>
                  <option value="">-- Seleccione --</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Teléfono</label>
                <input type="tel" class="form-control form-control-sm" name="telefono">
              </div>
              <div class="col-md-6">
                <label class="form-label">Correo</label>
                <input type="email" class="form-control form-control-sm" name="correo">
              </div>
              <div class="col-12">
                <label class="form-label">Dirección</label>
                <input type="text" class="form-control form-control-sm" name="direccion">
              </div>
              <div class="col-12 mt-2">
                <button id="btn-reg-empleado" type="submit" class="btn btn-primary btn-sm w-100">
                  <i class="bi bi-save me-1"></i>Registrar empleado
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- ══════════════════ USUARIOS ══════════════════ -->
    <div class="tab-pane fade" id="tab-usuarios">
      <div class="card" style="max-width:500px;">
        <div class="card-header"><i class="bi bi-person-lock me-1"></i>Crear Usuario del Sistema</div>
        <div class="card-body">
          <form id="form-usuario" novalidate>
            <div class="mb-2">
              <label class="form-label">ID Empleado *</label>
              <input type="number" class="form-control form-control-sm" name="empleadoId" required>
            </div>
            <div class="mb-2">
              <label class="form-label">Código de usuario *</label>
              <input type="text" class="form-control form-control-sm" name="username" autocomplete="username" required>
            </div>
            <div class="mb-2">
              <label class="form-label">Contraseña *</label>
              <input type="password" class="form-control form-control-sm" name="password" autocomplete="new-password" minlength="8" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Confirmar contraseña *</label>
              <input type="password" class="form-control form-control-sm" name="confirmPassword" autocomplete="new-password" minlength="8" required>
            </div>
            <button id="btn-crear-usuario" type="submit" class="btn btn-primary btn-sm w-100">
              <i class="bi bi-person-check me-1"></i>Crear usuario
            </button>
          </form>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="../js/rrhh/presentation/rrhh.controller.js"></script>
</body>
</html>
