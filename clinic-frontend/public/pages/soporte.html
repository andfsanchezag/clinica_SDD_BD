<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clínica IPS — Soporte de Información</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../assets/css/styles.css">
  <style>
    #sidebar-recursos { min-width: 200px; max-width: 220px; overflow-y: auto; }
    .sidebar-group-label { font-size: .7rem; font-weight: 700; text-transform: uppercase; color: var(--sura-blue); padding: .4rem .5rem .1rem; }
    #crud-table-wrapper { overflow-x: auto; }
    .list-group-item-sm { font-size: .8rem; }
  </style>
</head>
<body>

<div id="navbar-container"></div>

<div class="d-flex" style="height: calc(100vh - 56px); overflow: hidden;">

  <!-- ── Sidebar ── -->
  <div id="sidebar-recursos" class="list-group list-group-flush border-end bg-light py-2 px-1"></div>

  <!-- ── Main content ── -->
  <div class="flex-grow-1 p-3 overflow-auto">
    <div id="banner-soporte" class="mb-2"></div>

    <div class="row g-3">

      <!-- Tabla -->
      <div class="col-12">
        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center">
            <span id="tabla-titulo"><i class="bi bi-table me-1"></i>Listado</span>
            <button class="btn btn-outline-secondary btn-sm" id="btn-recargar" title="Recargar">
              <i class="bi bi-arrow-clockwise"></i>
            </button>
          </div>
          <div class="card-body p-0">
            <div id="crud-table-wrapper">
              <table class="table table-sm table-hover table-bordered mb-0">
                <thead id="crud-table-head" class="table-dark"></thead>
                <tbody id="crud-table-body"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- Formulario CRUD -->
      <div class="col-12 col-lg-5">
        <div class="card">
          <div class="card-header" id="form-crud-title">Nuevo</div>
          <div class="card-body">
            <form id="form-crud" novalidate>
              <div id="form-fields"><!-- campos dinámicos --></div>
              <div class="d-flex gap-2 mt-3">
                <button id="btn-guardar" type="submit" class="btn btn-primary btn-sm flex-grow-1">Crear</button>
                <button id="btn-cancelar-edicion" type="button" class="btn btn-secondary btn-sm d-none">Cancelar</button>
              </div>
            </form>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Modal confirmación borrado (inyectado por modal.confirm.js) -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="../js/soporte/presentation/crud.controller.js"></script>
<script type="module">
  // Botón recargar
  import { crudUseCaseFactory } from '../js/soporte/application/crud.usecase.factory.js';
  document.getElementById('btn-recargar')?.addEventListener('click', () => {
    // Trigger recargar desde controller
    document.getElementById('sidebar-recursos')
      ?.querySelector('a.active')?.click();
  });
</script>
</body>
</html>
