<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clínica IPS — Iniciar sesión</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<div class="login-wrapper">
  <div class="card login-card shadow-lg">
    <div class="card-header">
      <i class="bi bi-hospital-fill fs-4 d-block mb-1"></i>
      <div>Clínica IPS</div>
      <small class="fw-normal opacity-75">Sistema de Información</small>
    </div>
    <div class="card-body p-4">

      <div id="login-error" class="alert alert-danger d-none py-2" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-1"></i>
        <span></span>
      </div>

      <form id="form-login" novalidate>
        <div class="mb-3">
          <label for="username" class="form-label">Usuario</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control" id="username" name="username"
                   placeholder="Código de usuario" required autocomplete="username">
          </div>
        </div>

        <div class="mb-4">
          <label for="password" class="form-label">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="password" name="password"
                   placeholder="Contraseña" required autocomplete="current-password">
          </div>
        </div>

        <button id="btn-login" type="submit" class="btn btn-primary w-100">
          <i class="bi bi-box-arrow-in-right me-1"></i>Iniciar sesión
        </button>
      </form>

    </div>
    <div class="card-footer text-center text-muted" style="font-size:.75rem">
      &copy; 2026 Clínica IPS — v1.0
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="../js/login/presentation/login.controller.js"></script>
</body>
</html>
